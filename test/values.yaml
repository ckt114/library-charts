test:
  serviceName: MyService

  externalSecrets:
    appCredentials:
      dataFrom:
        - extract:
            key: '{{ include "common.secretNamespace" . }}-credentials'
      data:
        - secretKey: api-token
          remoteRef:
            key: library-charts/test/app
            property: apiToken
      refreshPolicy: Periodic
      refreshInterval: 30m

  extraObjects:
    - apiVersion: external-secrets.io/v1
      kind: ConfigMap
      metadata:
        name: '{{ include "common.names.fullname" . }}'
